name: ROBOT TEST MANUAL 3 TIROS
on:
  workflow_dispatch:
jobs:
  run-scraper:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - run: npm install node-fetch cheerio
      - run: node --no-warnings "index test.js"