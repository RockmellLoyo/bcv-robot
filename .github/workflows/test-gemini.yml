name: Test Metodo Gemini

on:
  schedule:
    - cron: '0 16 * * 1-5' # 12:00 PM de Venezuela con c·lculo exacto
  workflow_dispatch:

jobs:
  ejecutar-gemini:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - run: npm install
      - run: node test.js geminis_metodo